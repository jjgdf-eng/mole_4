<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Môle 4 — Port de Dunkerque</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ocean:#002D52;
  --ocean-mid:#1A6FBF;
  --ocean-light:#4A9FEF;
  --ocean-glow:#6DBEFF;
  --sand:#F5F1EB;
  --sand2:#EDE8DF;
  --sand3:#DDD6CA;
  --rust:#D4541E;
  --lime:#2DBF6A;
  --amber:#F4A024;
  --violet:#7B3FA0;
  --teal:#0FA89A;
  --text:#0E1C28;
  --text2:#52697A;
  --text3:#94AABB;
  --border:rgba(0,45,82,0.10);
  --border2:rgba(0,45,82,0.20);
  --radius:10px;
  --radius-lg:16px;
  --shadow:0 2px 14px rgba(0,45,82,0.07);
  --shadow-md:0 6px 28px rgba(0,45,82,0.12);
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --ocean:#001B33;
  --ocean-mid:#1A6FBF;
  --ocean-light:#4A9FEF;
  --ocean-glow:#6DBEFF;
  --sand:#0F1923;
  --sand2:#172433;
  --sand3:#1F3044;
  --text:#E0EAF5;
  --text2:#7A9EB8;
  --text3:#3E607A;
  --border:rgba(74,159,239,0.10);
  --border2:rgba(74,159,239,0.20);
  --shadow:0 2px 14px rgba(0,0,0,0.35);
  --shadow-md:0 6px 28px rgba(0,0,0,0.45);
}}
body{font-family:var(--font-body);background:var(--sand);color:var(--text);font-size:14px;line-height:1.6;}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;min-width:240px;
  background:var(--ocean);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  box-shadow:4px 0 24px rgba(0,0,0,0.3);
}
.sb-logo{
  padding:26px 20px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(160deg,rgba(74,159,239,0.08) 0%,transparent 60%);
  position:relative;overflow:hidden;
}
.sb-logo::after{
  content:'';position:absolute;top:-20px;right:-20px;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(74,159,239,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.sb-logo-badge{
  display:inline-block;
  font-size:9px;font-weight:700;letter-spacing:2.5px;
  color:var(--ocean-light);text-transform:uppercase;
  margin-bottom:8px;
}
.sb-logo-title{
  font-family:var(--font-display);
  font-size:22px;font-weight:800;color:#fff;
  display:block;letter-spacing:-0.5px;line-height:1.1;
}
.sb-logo-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:5px;display:block;font-weight:400}

/* sidebar accent line */
.sb-accent{height:2px;background:linear-gradient(90deg,var(--ocean-light),transparent);margin:0 20px 6px;}

nav{flex:1;padding:8px 0 10px}
.nav-section-label{
  font-size:9px;font-weight:700;letter-spacing:2.5px;
  color:rgba(255,255,255,0.25);text-transform:uppercase;
  padding:14px 20px 5px;
}
.nav-btn{
  width:100%;background:none;border:none;
  padding:9px 14px 9px 16px;display:flex;align-items:center;gap:10px;
  cursor:pointer;color:rgba(255,255,255,0.6);
  font-family:var(--font-body);font-size:13px;font-weight:500;text-align:left;
  border-left:3px solid transparent;
  transition:all 0.2s;
}
.nav-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9)}
.nav-btn.active{
  background:rgba(255,255,255,0.10);color:#fff;font-weight:600;
  border-left-color:var(--ocean-light);
}
.nav-icon{
  width:30px;height:30px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.nav-sub{padding-left:54px;display:none}
.nav-sub.open{display:block}
.nav-sub a{
  display:block;padding:5px 10px;font-size:12px;
  color:rgba(255,255,255,0.4);cursor:pointer;border-radius:6px;
  transition:all 0.15s;
}
.nav-sub a:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06)}
.sb-footer{
  padding:14px 20px;border-top:1px solid rgba(255,255,255,0.07);
  font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.5px;
}
.sb-footer strong{display:block;color:rgba(255,255,255,0.45);font-size:11px;margin-bottom:2px}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:28px 32px;background:var(--sand)}
.section{display:none}
.section.active{display:block;animation:fadeIn 0.35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER BLOCK ── */
.header-block{
  background:linear-gradient(145deg,var(--ocean) 0%,#0A4A8A 55%,#1A6FBF 100%);
  border-radius:var(--radius-lg);
  padding:32px 30px 28px;
  margin-bottom:26px;
  position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,45,82,0.25);
}
.header-block::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(74,159,239,0.12) 0%,transparent 70%);
}
.header-block::after{
  content:'';position:absolute;bottom:-80px;left:30px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%);
}
.header-tag{
  font-size:10px;font-weight:700;letter-spacing:3px;
  color:var(--ocean-glow);text-transform:uppercase;
  margin-bottom:12px;
}
.header-block h1{
  font-family:var(--font-display);
  font-size:30px;font-weight:800;color:#fff;
  letter-spacing:-0.5px;line-height:1.15;margin-bottom:10px;
}
.header-block p{font-size:13px;color:rgba(255,255,255,0.55);font-weight:400}
.header-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
.header-chip{
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;padding:5px 14px;
  font-size:11px;color:rgba(255,255,255,0.85);font-weight:500;
  transition:background 0.2s;
}
.header-chip:hover{background:rgba(255,255,255,0.16)}

/* ── SECTION HEADER ── */
.sec-header{
  display:flex;align-items:flex-start;gap:18px;
  margin-bottom:22px;padding:20px 22px;
  background:var(--sand2);
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}
.sec-num{
  font-family:var(--font-display);
  font-size:48px;font-weight:800;
  color:var(--border2);line-height:1;min-width:60px;
}
.sec-tag{
  display:inline-block;padding:3px 12px;
  border-radius:20px;font-size:10px;font-weight:700;
  margin-bottom:6px;color:#fff;letter-spacing:0.5px;
  text-transform:uppercase;
}
.sec-title{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--text)}
.sec-desc{font-size:12px;color:var(--text2);margin-top:3px}

/* ── KPI STRIP ── */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.kpi-item{
  background:var(--sand2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px 12px;text-align:center;
  box-shadow:var(--shadow);transition:transform 0.2s,box-shadow 0.2s;
  cursor:default;
}
.kpi-item:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.kpi-val{font-family:var(--font-display);font-size:24px;font-weight:800;line-height:1}
.kpi-label{font-size:10px;color:var(--text2);margin-top:4px;font-weight:500;letter-spacing:0.3px}

/* ── CARDS GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.card{
  background:var(--sand2);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:var(--shadow);transition:box-shadow 0.2s,transform 0.2s;
}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.card-stripe{height:4px}
.banner{
  height:150px;background:var(--sand3);cursor:pointer;
  position:relative;display:flex;align-items:center;
  justify-content:center;overflow:hidden;
}
.banner img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
.banner:hover img{transform:scale(1.04)}
.banner-placeholder{text-align:center;color:var(--text3);pointer-events:none}
.banner-placeholder i{font-size:34px;display:block;margin-bottom:6px;opacity:0.5}
.banner-placeholder p{font-size:11px;font-weight:500;opacity:0.7}
.banner-tag{
  position:absolute;top:10px;left:10px;
  padding:3px 10px;border-radius:20px;
  font-size:10px;color:#fff;font-weight:700;letter-spacing:0.5px;
  backdrop-filter:blur(6px);
}
.banner-num{
  position:absolute;top:10px;right:10px;
  background:rgba(0,0,0,0.5);color:#fff;
  padding:3px 8px;border-radius:10px;font-size:11px;font-weight:700;
}
.banner-change{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,0.6);color:#fff;border:none;
  padding:5px 10px;border-radius:8px;font-size:10px;cursor:pointer;
  display:flex;align-items:center;gap:5px;backdrop-filter:blur(4px);
  transition:background 0.2s;opacity:0;
}
.banner:hover .banner-change{opacity:1}
.banner-change:hover{background:rgba(0,0,0,0.85)}
.card-body{padding:14px}
.card-title{
  font-family:var(--font-display);
  font-size:13px;font-weight:700;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  color:var(--text);user-select:none;
}
.card-content{
  display:none;font-size:12px;line-height:1.75;color:var(--text2);
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
}
.card.open .card-content{display:block}

/* ── FINANCE CARDS ── */
.finance-card{
  background:var(--sand2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;
  box-shadow:var(--shadow);transition:box-shadow 0.2s;
}
.finance-card:hover{box-shadow:var(--shadow-md)}
.finance-head{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.finance-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.finance-label{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.finance-title{font-family:var(--font-display);font-size:15px;font-weight:700}
.finance-amount{
  font-family:var(--font-display);
  font-size:34px;font-weight:800;
  color:var(--text);margin:8px 0;
}
.finance-sub{font-size:11px;color:var(--text2);margin-bottom:12px}
.finance-items{padding-left:16px;font-size:12px;color:var(--text2);line-height:2.1}
.bar{height:8px;background:var(--sand3);border-radius:4px;margin-top:12px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease}

/* ── PHASE CARDS ── */
.phase-timeline{border-left:2px solid var(--border2);margin-left:10px}
.phase-card{
  background:var(--sand2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px 20px 20px 24px;
  margin-bottom:16px;position:relative;
  box-shadow:var(--shadow);margin-left:16px;
}
.phase-dot{
  width:16px;height:16px;border-radius:50%;
  background:var(--ocean-mid);
  position:absolute;left:-25px;top:24px;
  border:3px solid var(--sand);
  box-shadow:0 0 0 2px var(--ocean-mid);
}
.phase-num{font-size:9px;font-weight:700;color:var(--ocean-light);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:5px}
.phase-title{font-family:var(--font-display);font-size:17px;font-weight:700}
.phase-years{font-size:12px;color:var(--text2);margin-bottom:14px;font-weight:500}
.phase-tasks{padding-left:0;list-style:none;font-size:12px;color:var(--text2);line-height:2.1}

/* ── ENERGY CARDS ── */
.energy-card{
  background:var(--sand2);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:var(--shadow);transition:box-shadow 0.2s;
}
.energy-card:hover{box-shadow:var(--shadow-md)}
.energy-head{display:flex;align-items:center;gap:12px;padding:16px 16px 0}
.energy-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.energy-title{font-family:var(--font-display);font-size:14px;font-weight:700}
.energy-sub{font-size:11px;color:var(--text2);font-weight:500}
.energy-val{font-family:var(--font-display);font-size:30px;font-weight:800;padding:10px 16px 0;color:var(--text)}
.energy-points{padding:8px 16px 16px 30px;font-size:11px;color:var(--text2);line-height:2}

/* ── ODD GRID ── */
.odd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.odd-card{
  border-radius:var(--radius-lg);padding:18px;cursor:pointer;
  transition:transform 0.25s,box-shadow 0.25s;
  box-shadow:0 4px 18px rgba(0,0,0,0.18);
}
.odd-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,0.25)}
.odd-badge{font-size:9px;font-weight:700;color:rgba(255,255,255,0.65);margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase}
.odd-num{font-family:var(--font-display);font-size:48px;font-weight:800;color:rgba(255,255,255,0.15);line-height:1}
.odd-icon{font-size:26px;display:block;margin:6px 0}
.odd-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:#fff;margin-bottom:5px}
.odd-desc{display:none;font-size:11px;color:rgba(255,255,255,0.88);line-height:1.7}
.odd-card.open .odd-desc{display:block}
.odd-card.open .odd-num{display:none}

/* ── MOB KPI ── */
.mob-kpi{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.mob-kpi-item{
  background:var(--sand3);border-radius:8px;
  padding:7px 12px;text-align:center;border:1px solid var(--border);
}
.mob-kpi-val{font-family:var(--font-display);font-size:15px;font-weight:800;color:var(--text)}
.mob-kpi-label{font-size:10px;color:var(--text2);font-weight:500}

/* ── LIGHTBOX ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.lightbox.active{display:flex}
.lightbox img{max-width:90%;max-height:90%;border-radius:14px;object-fit:contain;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.lb-close{
  position:fixed;top:20px;right:20px;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
  color:#fff;width:42px;height:42px;border-radius:50%;cursor:pointer;
  font-size:20px;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);transition:background 0.2s;
}
.lb-close:hover{background:rgba(255,255,255,0.25)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--ocean);color:#fff;
  border:1px solid rgba(255,255,255,0.15);
  padding:11px 22px;border-radius:28px;font-size:12px;font-weight:500;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  z-index:1000;pointer-events:none;
  box-shadow:0 8px 28px rgba(0,0,0,0.3);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── BUDGET OVERVIEW ── */
.budget-overview{
  background:linear-gradient(145deg,var(--ocean) 0%,#0A4A8A 60%,#1A6FBF 100%);
  border-radius:var(--radius-lg);padding:22px;
  margin-bottom:16px;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,45,82,0.25);
}
.budget-overview::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;
  background:radial-gradient(circle,rgba(74,159,239,0.12) 0%,transparent 70%);
}
.budget-label{font-size:10px;font-weight:700;letter-spacing:2.5px;color:rgba(255,255,255,0.45);text-transform:uppercase;margin-bottom:4px}
.budget-amount{font-family:var(--font-display);font-size:44px;font-weight:800;color:#fff;line-height:1}
.budget-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px;margin-bottom:18px}
.budget-legend{display:flex;flex-direction:column;gap:6px}
.budget-legend-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.budget-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.budget-legend-label{color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:7px;flex:1}
.budget-legend-val{font-weight:700;color:#fff}
.budget-bar-track{height:12px;background:rgba(255,255,255,0.12);border-radius:6px;margin-top:14px;overflow:hidden}

/* ── SAVE INSTRUCTIONS ── */
.save-banner{
  background:linear-gradient(135deg,rgba(26,111,191,0.12),rgba(45,191,106,0.08));
  border:1px solid rgba(26,111,191,0.2);
  border-radius:var(--radius-lg);padding:16px 20px;
  margin-bottom:22px;display:flex;align-items:flex-start;gap:12px;
}
.save-banner-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.save-banner h3{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.save-banner p{font-size:12px;color:var(--text2);line-height:1.6}
.save-banner code{background:var(--sand3);padding:1px 6px;border-radius:4px;font-size:11px;font-family:monospace}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .sidebar{width:58px;min-width:58px}
  .sb-logo-title,.sb-logo-sub,.sb-logo-badge,.nav-btn span:not(.nav-icon),.nav-sub,.sb-footer,.nav-section-label{display:none}
  .nav-btn{justify-content:center;padding:12px}
  .kpi-strip{grid-template-columns:repeat(3,1fr)}
  .odd-grid{grid-template-columns:1fr 1fr}
  .main{padding:14px 16px}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-badge">Port de Dunkerque</div>
      <span class="sb-logo-title">MÔLE 4</span>
      <small class="sb-logo-sub">Projet Urbain 2025–2032</small>
    </div>
    <div class="sb-accent"></div>
    <nav id="nav"></nav>
    <div class="sb-footer">
      <strong>Môle 4</strong>
      Poster interactif · v2025
    </div>
  </div>
  <div class="main" id="main"></div>
</div>
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
</div>
<div class="toast" id="toast"></div>

<!-- 
  LISTE DES IDs D'IMAGES :
  Section 1 : b1, b2, b3, b4, b5
  Section 3 : ph1img, ph2img, ph3img
  Section 4 : m1, m2, m3
  Section 5 : e1img, e2img, e3img, e4img
-->

<script>
const NAV=[
  {n:1,icon:'🏙️',label:"Vue d'ensemble",color:'rgba(212,84,30,0.22)',sub:[
    {icon:'🗺️',label:'Vue générale',el:'b1'},{icon:'🏠',label:'Habitat & Services',el:'b2'},
    {icon:'🌿',label:'Parc',el:'b3'},{icon:'🏥',label:'Pôle Médical',el:'b4'},{icon:'🎓',label:'Formation',el:'b5'}
  ]},
  {n:2,icon:'💰',label:'Financement',color:'rgba(26,111,191,0.22)',sub:[
    {icon:'🇪🇺',label:'FEDER / Interreg',el:'f1'},{icon:'🏛️',label:'Collectivités',el:'f2'},
    {icon:'🏗️',label:'Privé',el:'f3'},{icon:'🌿',label:'Fonds verts',el:'f4'}
  ]},
  {n:3,icon:'🔨',label:'Réaménagement',color:'rgba(45,191,106,0.22)',sub:[
    {icon:'📅',label:'Phase 1',el:'ph1'},{icon:'📅',label:'Phase 2',el:'ph2'},{icon:'📅',label:'Phase 3',el:'ph3'}

  {n:4,icon:'🚌',label:'Accès & Mobilités',color:'rgba(123,63,160,0.22)',sub:[
    {icon:'🚌',label:'Transport',el:'m1'},{icon:'🚲',label:'Mobilités douces',el:'m2'},{icon:'🚗',label:'Stationnement',el:'m3'}
  ]},
  {n:5,icon:'⚡',label:'Énergie',color:'rgba(244,160,36,0.22)',sub:[
    {icon:'🌊',label:'Houlomotrice',el:'e1'},{icon:'♻️',label:'Réduction',el:'e2'},
    {icon:'🔗',label:'Innovation',el:'e3'},{icon:'🚰',label:'Traitement eau',el:'e4'}
  ]},
  {n:6,icon:'🌍',label:'ODD',color:'rgba(15,168,154,0.22)',sub:[]}
];

let activeSection=1, openSubs=new Set([1]), openBlocks=new Set(), openOdds=new Set(), toastTimer=null;

/* ── IMAGE SYSTEM (HTML-based, GitHub compatible) ── */
function loadImages(){
  const store={};
  document.querySelectorAll('#img-store span').forEach(el=>{
    const id=el.getAttribute('data-img-id');
    const src=el.getAttribute('data-img-src');
    if(id&&src) store[id]=src;
  });
  return store;
}

function getImages(){return loadImages();}

/* Upload flow: shows an in-memory preview AND instructions to save permanently */
const sessionImages={};

function handleFile(id,file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    sessionImages[id]=ev.target.result;
    showToast('✓ Photo chargée (session) — voir instructions pour la conserver');
    renderAll();
  };
  reader.readAsDataURL(file);
}

function getImage(id){return sessionImages[id]||getImages()[id]||null;}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}
function openLightbox(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('active');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('active');}
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});

function makeBanner(id,tag,tagColor,num,style=''){
  const img=getImage(id);
  return `<div class="banner" style="${style}" onclick="bannerClick('${id}')">
    ${img
      ?`<img src="${img}" alt=""><button class="banner-change" onclick="event.stopPropagation();document.getElementById('fi-${id}').click()"><i class="ti ti-upload" style="font-size:11px"></i> Changer</button>`
      :`<div class="banner-placeholder"><i class="ti ti-photo-plus"></i><p>Ajouter une photo</p></div>`}
    ${tag?`<span class="banner-tag" style="background:${tagColor}">${tag}</span>`:''}
    ${num?`<span class="banner-num">${num}</span>`:''}
    <input type="file" accept="image/*" id="fi-${id}" style="display:none" onchange="handleFile('${id}',this.files[0])">
  </div>`;
}

function bannerClick(id){const img=getImage(id);if(img)openLightbox(img);else document.getElementById('fi-'+id).click();}
function showSection(n){activeSection=n;openSubs=new Set([n]);renderAll();document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});}
function scrollToEl(id){setTimeout(()=>{const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);}
function toggleBlock(id){openBlocks.has(id)?openBlocks.delete(id):openBlocks.add(id);renderAll();}
function toggleOdd(idx){openOdds.has(idx)?openOdds.delete(idx):openOdds.add(idx);renderAll();}

function saveBanner(){
  return `<div class="save-banner">
    <div class="save-banner-icon">💾</div>
    <div>
      <h3>Conserver les photos définitivement sur GitHub Pages</h3>
      <p>Les images chargées ici sont temporaires (session). Pour les rendre permanentes :<br>
      1. Convertissez vos images sur <strong>base64-image.de</strong><br>
      2. Ouvrez <code>index.html</code> et cherchez <code>data-img-id="votre_id"</code><br>
      3. Collez la valeur base64 dans <code>data-img-src="..."</code><br>
      4. Commitez sur GitHub — c'est permanent ✓</p>
    </div>
  </div>`;
}

function renderNav(){
  document.getElementById('nav').innerHTML=`<div class="nav-section-label">Sections</div>`+NAV.map(item=>`
    <div>
      <button class="nav-btn ${activeSection===item.n?'active':''}" onclick="showSection(${item.n})">
        <span class="nav-icon" style="background:${item.color}">${item.icon}</span>
        <span style="flex:1">${item.label}</span>
        ${item.sub.length?`<i class="ti ti-chevron-${openSubs.has(item.n)?'up':'down'}" style="font-size:12px;color:rgba(255,255,255,0.3)"></i>`:''}
      </button>
      <div class="nav-sub ${openSubs.has(item.n)?'open':''}">
        ${item.sub.map(s=>`<a onclick="showSection(${item.n});scrollToEl('${s.el}')">${s.icon} ${s.label}</a>`).join('')}
      </div>
    </div>`).join('');
}

function sec1(){
  const cards=[
